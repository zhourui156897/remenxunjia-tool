name: Build Windows Installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Install Tesseract OCR
        run: |
          choco install tesseract -y
        shell: cmd

      - name: Download Tesseract Chinese language data
        run: |
          $tessdataDir = "C:\Program Files\Tesseract-OCR\tessdata"
          $url = "https://github.com/tesseract-ocr/tessdata/raw/main/chi_sim.traineddata"
          Invoke-WebRequest -Uri $url -OutFile (Join-Path $tessdataDir "chi_sim.traineddata")
          Write-Host "Downloaded chi_sim.traineddata"
          Get-ChildItem $tessdataDir -Filter "*.traineddata" | ForEach-Object { Write-Host $_.Name }
        shell: pwsh

      - name: Build with PyInstaller
        run: |
          pyinstaller build.spec --noconfirm

      - name: Copy Tesseract to distribution
        run: |
          $tessPath = "C:\Program Files\Tesseract-OCR"
          $destPath = "tesseract"

          New-Item -ItemType Directory -Force -Path $destPath
          Copy-Item -Path "$tessPath\tesseract.exe" -Destination $destPath -Force

          Get-ChildItem -Path $tessPath -Filter "*.dll" | Copy-Item -Destination $destPath -Force

          $tessdataSrc = Join-Path $tessPath "tessdata"
          $tessdataDest = Join-Path $destPath "tessdata"
          New-Item -ItemType Directory -Force -Path $tessdataDest

          foreach ($f in @("eng.traineddata", "chi_sim.traineddata", "osd.traineddata")) {
            $src = Join-Path $tessdataSrc $f
            if (Test-Path $src) {
              Copy-Item -Path $src -Destination $tessdataDest -Force
              Write-Host "Copied $f"
            } else {
              Write-Host "Skipped $f (not found)"
            }
          }
        shell: pwsh

      - name: Build Installer with Inno Setup
        run: |
          $content = Get-Content -Path "installer.iss" -Raw
          [System.IO.File]::WriteAllText(
            (Join-Path $pwd "installer.iss"),
            $content,
            [System.Text.UTF8Encoding]::new($true)
          )
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss
        shell: pwsh

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: installer_output/*.exe
          retention-days: 90

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: installer_output/*.exe
          generate_release_notes: true
